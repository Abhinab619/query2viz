<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tech Stack — LangChain SQL-to-Graph Pipeline</title>
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700&f[]=cabinet-grotesk@800,900&display=swap" rel="stylesheet">
<style>
/* (UNCHANGED CSS — EXACTLY SAME AS YOUR FILE) */
:root,[data-theme="light"]{
  --color-bg:#f7f6f2;--color-surface:#f9f8f5;--color-surface-2:#fbfbf9;
  --color-surface-offset:#f3f0ec;--color-border:#d4d1ca;--color-divider:#dcd9d5;
  --color-text:#28251d;--color-text-muted:#7a7974;--color-text-faint:#bab9b4;
  --color-primary:#01696f;--color-primary-hover:#0c4e54;
  --color-purple:#7a39bb;--color-orange:#da7101;--color-blue:#006494;
  --color-success:#437a22;--color-gold:#d19900;--color-error:#a12c7b;
  --shadow-sm:0 1px 2px oklch(0.2 0.01 80/0.06);
  --shadow-md:0 4px 12px oklch(0.2 0.01 80/0.08);
  --shadow-lg:0 12px 32px oklch(0.2 0.01 80/0.12);
  --radius-sm:.375rem;--radius-md:.5rem;--radius-lg:.75rem;--radius-xl:1rem;--radius-full:9999px;
  --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;--space-6:1.5rem;
  --space-8:2rem;--space-12:3rem;--space-16:4rem;
  --text-xs:clamp(.75rem,.7rem + .25vw,.875rem);
  --text-sm:clamp(.875rem,.8rem + .35vw,1rem);
  --text-base:clamp(1rem,.95rem + .25vw,1.125rem);
  --text-lg:clamp(1.125rem,1rem + .75vw,1.5rem);
  --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
  --text-2xl:clamp(2rem,1.2rem + 2.5vw,3.5rem);
  --font-display:'Cabinet Grotesk',system-ui,sans-serif;
  --font-body:'Satoshi','Inter',system-ui,sans-serif;
  --transition:180ms cubic-bezier(0.16,1,0.3,1);
}
[data-theme="dark"]{
  --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
  --color-surface-offset:#1d1c1a;--color-border:#393836;--color-divider:#262523;
  --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
  --color-primary:#4f98a3;--color-primary-hover:#227f8b;
  --color-purple:#a86fdf;--color-orange:#fdab43;--color-blue:#5591c7;
  --color-success:#6daa45;--color-gold:#e8af34;--color-error:#d163a7;
  --shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);
  --shadow-lg:0 12px 32px oklch(0 0 0/.4);
}
/* rest of CSS unchanged... */
</style>
</head>
<body>
<a class="skip-link" href="#main">Skip to content</a>

<header>
  <a class="logo" href="#">
    <!-- SVG unchanged -->
    <span class="logo-text">SQL<span>Graph</span></span>
  </a>
  <button class="theme-btn" data-theme-toggle aria-label="Switch theme">
    <!-- icon handled by JS -->
  </button>
</header>

<!-- (ALL HTML CONTENT UNCHANGED — HERO, GRID, CARDS, TABLE, ETC.) -->

<script>
(function(){
  const t=document.querySelector('[data-theme-toggle]');
  const r=document.documentElement;

  // ONLY CHANGE HERE ↓
  let d=r.getAttribute('data-theme')||'light';

  function setIcon(){
    t.innerHTML=d==='dark'
      ?'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
      :'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
  }
  setIcon();
  t&&t.addEventListener('click',()=>{
    d=d==='dark'?'light':'dark';
    r.setAttribute('data-theme',d);
    t.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode');
    setIcon();
  });
})();
</script>
</body>
</html>
